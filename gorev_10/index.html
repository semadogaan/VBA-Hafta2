<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sema Nur Doğan - Portfolyo</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b132b; 
            color: #e5e5e5;
            font-family: 'Georgia', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .cursor-glow {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(200, 170, 110, 0.15) 0%, rgba(11, 19, 43, 0) 70%);
            border-radius: 50%;
            position: absolute;
            pointer-events: none; 
            transform: translate(-50%, -50%);
            transition: width 0.2s, height 0.2s;
            z-index: 0;
        }

        .portfolio-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            width: 400px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            z-index: 1;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #c8aa6e; 
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(200, 170, 110, 0.2);
        }

        h1 {
            font-size: 1.8em;
            margin: 0 0 10px 0;
            letter-spacing: 2px;
            font-weight: normal;
        }

        p {
            color: #8d99ae;
            font-family: sans-serif;
            margin-bottom: 30px;
            font-size: 0.9em;
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            background: transparent;
            color: #e5e5e5;
            text-decoration: none;
            padding: 12px 20px;
            border: 1px solid #c8aa6e;
            border-radius: 5px;
            font-family: sans-serif;
            font-size: 0.9em;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            background: #c8aa6e;
            color: #0b132b;
            font-weight: bold;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="cursor-glow" id="glow"></div>

    <div class="portfolio-card">
        <img src="gorev_10/foto.jpg" alt="Sema Nur Doğan" class="profile-img">
        <h1>Sema Nur Doğan</h1>
        <p>Veri Bilimi ve Analitik | Global Finans</p>

        <div class="btn-container">
            <a href="doviz.html" class="btn">Döviz Çevirici Uygulaması</a>
            <a href="3. hafta/veri_gorsellestirmeleri.png" class="btn">Sentetik Veri Grafiği</a>
            <a href="3. hafta/egzersiz_verisi.csv" class="btn">Ham Veri Seti (CSV)</a>
        </div>
    </div>

    <script>
        const glow = document.getElementById('glow');
        document.addEventListener('mousemove', (e) => {
            glow.style.left = e.clientX + 'px';
            glow.style.top = e.clientY + 'px';
        });
    </script>

</body>
</html>
